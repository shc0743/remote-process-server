name: Build Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          compile.cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: rmpsm_server.*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile
        run: |
          ./compile.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: rmpsm_server.linux_*

  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            target: aarch64-linux-android
            api: 21
          - arch: armv7l
            target: armv7a-linux-androideabi
            api: 21

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile (${{ matrix.arch }})
        run: |
          $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}${{ matrix.api }}-clang++ \
            -std=c++17 \
            -I. \
            -o rmpsm_server.android_${{ matrix.arch }} \
            server.cpp

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: rmpsm_server.android_${{ matrix.arch }}

name: Publish Package to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Prepare release metadata
        id: prep
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BUILD_WORKFLOW_FILE: build-server.yml
        run: |
          chmod +x ./.scripts/prepare-publish.sh
          ./.scripts/prepare-publish.sh

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.prep.outputs.build_run_id }}
          path: ./server-artifacts
          pattern: rmpsm_server.*
          merge-multiple: true

      - name: Restore server binaries
        shell: bash
        run: |
          set -euo pipefail
          find server-artifacts -type f -name 'rmpsm_server.*' -exec cp -f {} . \;
          chmod +x rmpsm_server.* 2>/dev/null || true
          ls -l rmpsm_server.* || true

      - name: Install dependencies
        run: npm ci || npm i

      - name: Test
        run: npm test --if-present

      - name: Build to optimize performance
        run: npm run build --if-present

      - name: Publish to npm with provenance
        shell: bash
        env:
          NPM_DIST_TAG: ${{ steps.prep.outputs.npm_dist_tag }}
        run: |
          if [ "$NPM_DIST_TAG" = "latest" ]; then
            npm publish --provenance
          else
            npm publish --provenance --tag "$NPM_DIST_TAG"
          fi

name: Build delayed deletion module for Windows

on:
  push:
    branches: [ delayed-deletion ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: delayed_delete-win64-node24
          path: build/Release/delayed_delete.node
          if-no-files-found: error
